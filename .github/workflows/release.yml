name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: mer

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            use_cross: true

          # macOS
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz

          # Windows
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cross (Linux aarch64)
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          ASSET="${BIN_NAME}-${TAG}-${{ matrix.target }}.tar.gz"
          ASSET_LATEST="${BIN_NAME}-latest-${{ matrix.target }}.tar.gz"
          cp target/${{ matrix.target }}/release/${BIN_NAME} ${BIN_NAME}
          tar czf "${ASSET}" "${BIN_NAME}" README.md LICENSE
          cp "${ASSET}" "${ASSET_LATEST}"
          echo "ASSET=${ASSET}" >> $GITHUB_ENV
          echo "ASSET_LATEST=${ASSET_LATEST}" >> $GITHUB_ENV

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $TAG = $env:GITHUB_REF -replace 'refs/tags/', ''
          $ASSET = "$env:BIN_NAME-$TAG-${{ matrix.target }}.zip"
          $ASSET_LATEST = "$env:BIN_NAME-latest-${{ matrix.target }}.zip"
          Copy-Item "target/${{ matrix.target }}/release/$env:BIN_NAME.exe" "$env:BIN_NAME.exe"
          Compress-Archive -Path "$env:BIN_NAME.exe", "README.md", "LICENSE" -DestinationPath $ASSET
          Copy-Item $ASSET $ASSET_LATEST
          echo "ASSET=$ASSET" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "ASSET_LATEST=$ASSET_LATEST" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET_LATEST }}
          generate_release_notes: true
