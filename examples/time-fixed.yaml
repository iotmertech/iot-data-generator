# Simulated timestamps — fixed step example
# Each message's timestamp starts at `start` and advances by a fixed amount.
# Great for backfilling historical data or deterministic, evenly-spaced series.
#
# Result: ts = 2026-01-01 00:00:00, 00:05:00, 00:10:00, ...
#
# Usage:
#   mer preview payload -f examples/time-fixed.yaml
#   mer mqtt run -f examples/time-fixed.yaml

protocol: mqtt

target:
  broker: "mqtt://localhost:1883"
  topic: "devices/{device_id}/telemetry"
  qos: 1
  retain: false

device:
  count: 3
  id_prefix: device

payload:
  mode: random

run:
  total_messages: 100
  interval_ms: 500

time:
  mode: fixed
  start: "2026-01-01 00:00:00"   # also accepts RFC3339 "2026-01-01T00:00:00Z"
  step_secs: 300                 # +5 minutes per message
  field: ts                      # JSON key for the timestamp (default "ts")
