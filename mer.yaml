protocol: mqtt

target:
  broker: mqtts://mqtt.iotmer.cloud:8883
  topic: "mer/device/{device_id}/telemetry"
  client_id: "mer-client-{device_id}"
  qos: 1
  retain: false
  auth:
    username: "public"
    password: "public"

device:
  count: 5
  id_prefix: device

payload:
  mode: random

run:
  total_messages: 100
  interval_ms: 1000
